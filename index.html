<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXコース 簿記実習アーカイブ</title>
<style>
  :root {
    --green-dark: #1a5c3a;
    --green-mid: #2d8a57;
    --green-light: #e8f5ee;
    --green-accent: #3cb371;
    --orange-dark: #c2410c;
    --orange-mid: #ea580c;
    --orange-light: #ffedd5;
    --text-main: #1c2b22;
    --text-sub: #4a6b55;
    --border: #c2dece;
    --white: #ffffff;
    --gray-light: #f4f9f6;
    --yt-red: #c4302b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--gray-light);
    color: var(--text-main);
    min-height: 100vh;
  }

  header {
    background: var(--green-dark);
    color: var(--white);
    padding: 24px 32px 20px;
    border-bottom: 4px solid var(--green-accent);
  }

  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 0.8rem; opacity: 0.65; margin-top: 4px; }

  /* バナー帯 */
  .banner {
    background: var(--green-light);
    border-bottom: 2px solid var(--border);
    padding: 12px 20px;
  }

  .banner-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .banner-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .banner-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .banner-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--text-main);
  }

  .banner-label {
    font-weight: 700;
    color: var(--green-dark);
    white-space: nowrap;
  }

  .banner-value { color: var(--text-main); }

  .countdown {
    display: inline-block;
    background: var(--orange-mid);
    color: var(--white);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 4px;
  }

  .countdown.done { background: var(--green-mid); }

  .banner-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-mid);
    color: var(--white);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .banner-link:hover { background: var(--green-dark); }

  .banner-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--white);
    border: 1.5px solid var(--green-mid);
    color: var(--green-dark);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .banner-btn:hover { background: var(--green-mid); color: var(--white); }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 12px;
    max-width: 680px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  .modal-header {
    position: sticky;
    top: 0;
    background: var(--green-dark);
    color: var(--white);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 12px 12px 0 0;
  }

  .modal-title { font-size: 1rem; font-weight: 700; }

  .modal-close {
    background: none;
    border: none;
    color: var(--white);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 4px;
    opacity: 0.8;
  }

  .modal-close:hover { opacity: 1; }

  .modal-body { padding: 24px; }

  /* カリキュラム表 */
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 0.78rem;
    color: var(--text-sub);
  }

  .legend-item { display: flex; align-items: center; gap: 4px; }

  .legend-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .legend-mark.done { background: var(--green-mid); color: var(--white); }
  .legend-mark.today { background: var(--orange-mid); color: var(--white); }
  .legend-mark.future { background: var(--gray-light); color: var(--text-sub); border: 1px solid var(--border); }

  .curriculum-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .curriculum-table th {
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 700;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }

  .curriculum-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    line-height: 1.55;
  }

  .curriculum-table tr:last-child td { border-bottom: none; }

  .curriculum-table .num {
    font-weight: 700;
    color: var(--green-dark);
    white-space: nowrap;
    width: 56px;
  }

  .curriculum-table .status-cell {
    text-align: center;
    padding: 0;
  }

  .curriculum-table tr.done td { color: var(--text-sub); }
  .curriculum-table tr.done .num { color: var(--green-mid); }

  .curriculum-table tr.today td {
    background: var(--orange-light);
    font-weight: 700;
  }
  .curriculum-table tr.today .num { color: var(--orange-dark); }

  .curriculum-table tr.future td { color: var(--text-sub); opacity: 0.55; }
  .curriculum-table tr.future .num { color: var(--text-sub); }

  @media (max-width: 640px) {
    .banner-inner { gap: 8px; }
    .banner-sep { display: none; }
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  /* サイドバー */
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: sticky;
    top: 20px;
  }

  .sidebar-section {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    padding: 8px 4px 3px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 9px;
    text-decoration: none;
    color: var(--text-main);
    transition: all 0.15s;
    font-size: 0.76rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .sidebar-link:hover {
    border-color: var(--green-accent);
    background: var(--green-light);
    color: var(--green-dark);
  }

  .sidebar-icon {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.85rem;
  }

  .sidebar-icon.yt { background: var(--yt-red); }
  .sidebar-icon.yt svg { width: 12px; height: 12px; fill: var(--white); }
  .sidebar-icon.nlm {
    background: var(--white);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 2px;
  }

  .sidebar-creator {
    font-size: 0.66rem;
    color: var(--text-sub);
    line-height: 1.2;
  }

  .sidebar-name {
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--green-dark);
  }

  /* メインエリア */
  .main {
    flex: 1;
    min-width: 0;
  }

  /* モバイルメニュー開閉ボタン */
  .menu-toggle {
    display: none;
    background: var(--white);
    border: 1.5px solid var(--green-mid);
    color: var(--green-dark);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 12px;
    align-items: center;
    gap: 6px;
  }

  .menu-toggle:hover { background: var(--green-light); }

  @media (max-width: 640px) {
    .container { flex-direction: column; }
    .menu-toggle { display: inline-flex; }
    .sidebar {
      width: 100%;
      position: static;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0;
    }
    .sidebar.open {
      max-height: 1200px;
      padding: 8px 0;
    }
  }





  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tab-btn {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-bottom: none;
    color: var(--text-sub);
    padding: 6px 14px;
    font-size: 0.78rem;
    font-family: inherit;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.4;
    min-width: 72px;
    text-align: center;
  }

  .tab-row1 { font-weight: 700; font-size: 0.8rem; }
  .tab-row2 { font-size: 0.72rem; opacity: 0.85; }

  .tab-btn:hover { background: var(--green-light); color: var(--green-dark); }

  .tab-btn.active {
    background: var(--green-mid);
    color: var(--white);
    font-weight: 700;
    position: relative;
    border-color: var(--green-mid);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 2px;
    background: var(--white);
  }

  .panel-wrap {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 0 8px 8px 8px;
    padding: 32px 36px;
    box-shadow: 0 2px 12px rgba(45,138,87,0.06);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .date-badge {
    display: inline-block;
    background: transparent;
    color: var(--text-sub);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 0;
    border: none;
  }

  .date-badge::before {
    content: "🗓 ";
    margin-right: 2px;
  }

  .lesson-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .section-title {
    font-size: 1.0rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--green-light);
  }

  .purpose-list { list-style: none; margin-bottom: 28px; }

  .purpose-list li {
    padding: 5px 0 5px 20px;
    position: relative;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .purpose-list li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--green-accent);
    font-weight: 700;
  }

  .steps { display: flex; flex-direction: column; gap: 20px; }

  .step {
    border-left: 3px solid var(--green-accent);
    padding-left: 20px;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .step-num {
    background: var(--green-mid);
    color: var(--white);
    font-size: 0.72rem;
    font-weight: 700;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .step-label { font-size: 0.92rem; font-weight: 700; color: var(--green-dark); }
  .step-body { font-size: 0.87rem; color: var(--text-main); line-height: 1.75; }

  /* URLブロック */
  .url-block {
    background: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 10px 0;
  }

  .url-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }

  .url-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.78rem;
    color: var(--text-sub);
    word-break: break-all;
    flex: 1;
  }

  .copy-btn {
    background: var(--green-light);
    border: 1px solid var(--border);
    color: var(--green-dark);
    font-size: 0.7rem;
    font-family: inherit;
    padding: 3px 9px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-weight: 600;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: var(--green-accent);
    color: var(--white);
    border-color: var(--green-accent);
  }

  .copy-btn.copied {
    background: var(--green-mid);
    color: var(--white);
    border-color: var(--green-mid);
  }

  /* プロンプトブロック */
  .prompt-wrap { position: relative; margin: 10px 0; }

  .prompt-block {
    background: var(--green-light);
    border-left: 4px solid var(--green-accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
    font-size: 0.86rem;
    line-height: 1.7;
    color: var(--text-main);
  }

  .prompt-block-text { padding-right: 70px; }

  .prompt-copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--green-dark);
    font-size: 0.7rem;
    font-family: inherit;
    padding: 3px 9px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-weight: 600;
  }

  .prompt-copy-btn:hover {
    background: var(--green-accent);
    color: var(--white);
    border-color: var(--green-accent);
  }

  .prompt-copy-btn.copied {
    background: var(--green-mid);
    color: var(--white);
    border-color: var(--green-mid);
  }

  .hint-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-sub);
    margin-top: 14px;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  /* 追加指示リスト */
  .hint-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-note {
    font-size: 0.82rem; color: var(--text-sub); background: #fffbea;
    border-left: 3px solid #f0c040; border-radius: 0 4px 4px 0;
    padding: 7px 12px; margin: 8px 0; line-height: 1.65;
  }
  .tool-links { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
  .tool-link {
    display: inline-block; background: var(--green-light); border: 1.5px solid var(--border);
    color: var(--green-dark); font-size: 0.83rem; font-weight: 700;
    padding: 6px 14px; border-radius: 6px; text-decoration: none; transition: all 0.15s;
  }
  .tool-link:hover { background: var(--green-accent); color: var(--white); border-color: var(--green-accent); }
  .link-url-list { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
  .link-url-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--gray-light); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px;
  }
  .link-url-num { font-size: 0.78rem; font-weight: 700; color: var(--green-dark); min-width: 18px; }
  .link-url-a { font-family: 'Courier New', Courier, monospace; font-size: 0.78rem; color: var(--green-mid); text-decoration: none; word-break: break-all; }
  .link-url-a:hover { text-decoration: underline; }
  .prep-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
  .prep-item { display: flex; gap: 10px; align-items: flex-start; }
  .prep-check { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .prep-body { flex: 1; }
  .prep-label { font-size: 0.88rem; font-weight: 700; color: var(--green-dark); margin-bottom: 4px; }
  .prep-text { font-size: 0.85rem; color: var(--text-main); line-height: 1.65; margin-bottom: 4px; }
  .prep-link-wrap { margin-top: 6px; }
  .prep-link { font-size: 0.82rem; color: var(--green-dark); text-decoration: none; word-break: break-all; font-weight: 600; }
  .prep-link:hover { text-decoration: underline; }
  .lesson-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 14px;
  }
  .theme-badge {
    display: inline-block; background: var(--green-mid); color: var(--white);
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; padding: 3px 10px; border-radius: 20px;
  }
  .hint-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .hint-text {
    font-size: 0.83rem;
    color: var(--text-sub);
    flex: 1;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <h1>DXコース 簿記実習アーカイブ</h1>
</header>

<!-- バナー帯 -->
<div class="banner">
  <div class="banner-inner">
    <div class="banner-left">
      <div class="banner-item">
        <span class="banner-label">🎯 コース目標</span>
        <span class="banner-value">簿記3級のオンラインテストに合格する（AI利用可）</span>
      </div>
      <div class="banner-item">
        <span class="banner-label">📅 最終テスト日</span>
        <span class="banner-value">2026年5月28日</span>
        <span class="countdown" id="countdown"></span>
      </div>
    </div>
    <div class="banner-right">
      <a class="banner-link" href="https://nsboki-cbt.net-school.co.jp/" target="_blank" rel="noopener">
        📝 模擬試験を受ける
      </a>
      <button class="banner-btn" onclick="openModal()">
        📋 カリキュラム一覧
      </button>
    </div>
  </div>
</div>

<!-- カリキュラムモーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📋 5月簿記コース カリキュラム（全13回）</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="legend">
        <span class="legend-item"><span class="legend-mark done">✓</span>完了</span>
        <span class="legend-item"><span class="legend-mark today">●</span>本日</span>
        <span class="legend-item"><span class="legend-mark future">○</span>未実施</span>
      </div>
      <table class="curriculum-table" id="curriculumTable">
        <thead>
          <tr>
            <th style="width:32px;"></th>
            <th>回</th>
            <th>テーマ</th>
          </tr>
        </thead>
        <tbody id="curriculumBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="container">

  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="sidebar-section">ツール</div>

    <a class="sidebar-link" href="https://www.youtube.com/@DX-Biome/playlists" target="_blank" rel="noopener">
      <div class="sidebar-icon yt">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      </div>
      <div>
        <div class="sidebar-creator">動画アーカイブ</div>
        <div class="sidebar-name">DX-Biome</div>
      </div>
    </a>

const FINAL_TEST_DATE = "2026/5/28";

function toDate(s) {
  const [y, m, d] = s.split("/").map(Number);
  return new Date(y, m - 1, d);
}

function todayDate() {
  const t = new Date();
  return new Date(t.getFullYear(), t.getMonth(), t.getDate());
}

function updateCountdown() {
  const today = todayDate();
  const final = toDate(FINAL_TEST_DATE);
  const diff = Math.round((final - today) / (1000 * 60 * 60 * 24));
  const el = document.getElementById("countdown");
  if (!el) return;
  if (diff > 0) {
    el.textContent = `あと${diff}日`;
    el.classList.remove("done");
  } else if (diff === 0) {
    el.textContent = "本日";
    el.classList.remove("done");
  } else {
    el.textContent = "終了";
    el.classList.add("done");
  }
}

function getRoundStatus(round) {
  // lessons配列から該当回の日付を取得し、現在日と比較
  const today = todayDate();
  const items = lessons.filter(l => {
    const m = l.label.match(/第(\d+)回/);
    return m && parseInt(m[1]) === round;
  });
  if (items.length === 0) return "future";
  const dates = items.map(l => toDate(l.date));
  const maxDate = new Date(Math.max(...dates));
  const minDate = new Date(Math.min(...dates));
  if (maxDate < today) return "done";
  if (minDate <= today && today <= maxDate) return "today";
  // どれかが今日と一致する場合も today
  if (dates.some(d => d.getTime() === today.getTime())) return "today";
  return "future";
}

function renderCurriculum() {
  const tbody = document.getElementById("curriculumBody");
  if (!tbody) return;
  tbody.innerHTML = CURRICULUM.map(item => {
    const status = getRoundStatus(item.round);
    const mark = status === "done" ? '<span class="legend-mark done">✓</span>'
               : status === "today" ? '<span class="legend-mark today">●</span>'
               : '<span class="legend-mark future">○</span>';
    return `<tr class="${status}"><td class="status-cell">${mark}</td><td class="num">第${item.round}回</td><td>${item.theme}</td></tr>`;
  }).join("");
}

function openModal() {
  renderCurriculum();
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow = "";
}

function closeModalOutside(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

function copyText(text) {
  return new Promise((resolve, reject) => {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(resolve).catch(() => fallback());
    } else {
      fallback();
    }
    function fallback() {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        ok ? resolve() : reject();
      } catch (e) { reject(e); }
    }
  });
}

function flashCopied(btn, originalText) {
  copyText(btn.dataset.copyText).then(() => {
    btn.textContent = "コピー済み";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = originalText;
      btn.classList.remove("copied");
    }, 1800);
  }).catch(() => {
    btn.textContent = "失敗";
    setTimeout(() => { btn.textContent = originalText; }, 1800);
  });
}

function escapeHTML(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderStepBody(step) {
  let html = `<div class="step-body">${step.body}</div>`;

  if (step.note) {
    html += `<div class="step-note">※ ${step.note}</div>`;
  }

  if (step.linkUrls) {
    html += `<div class="link-url-list">`;
    step.linkUrls.forEach(item => {
      html += `<div class="link-url-row"><span class="link-url-num">${item.label}</span><a class="link-url-a" href="${item.url}" target="_blank" rel="noopener">${item.url}</a></div>`;
    });
    html += `</div>`;
  }

  if (step.toolLinks) {
    html += `<div class="tool-links">`;
    step.toolLinks.forEach(t => {
      html += `<a class="tool-link" href="${t.url}" target="_blank" rel="noopener">${t.name} →</a>`;
    });
    html += `</div>`;
  }

  if (step.urls) {
    html += `<div class="url-block">`;
    step.urls.forEach(u => {
      html += `
        <div class="url-row">
          <span class="url-text">${u}</span>
          <button class="copy-btn" data-copy-text="${escapeHTML(u)}" data-original="コピー">コピー</button>
        </div>`;
    });
    html += `</div>`;
  }

  if (step.prompt) {
    html += `
      <div class="prompt-wrap">
        <div class="prompt-block">
          <div class="prompt-block-text">${step.prompt}</div>
        </div>
        <button class="prompt-copy-btn" data-copy-text="${escapeHTML(step.prompt)}" data-original="コピー">コピー</button>
      </div>`;
  }

  if (step.hints) {
    html += `<div class="hint-label">追加指示の例：</div><ul class="hint-list">`;
    step.hints.forEach(h => {
      html += `
        <li class="hint-row">
          <span class="hint-text">「${h}」</span>
          <button class="copy-btn" data-copy-text="${escapeHTML(h)}" data-original="コピー">コピー</button>
        </li>`;
    });
    html += `</ul>`;
  }

  return html;
}

function renderAll() {
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");

  lessons.forEach((lesson, i) => {
    const isActive = i === lessons.length - 1;

    const btn = document.createElement("button");
    btn.className = "tab-btn" + (isActive ? " active" : "");
    const [row1, row2] = lesson.label.split(/(?=前半|後半)/);
    btn.innerHTML = `<span class="tab-row1">${row1}</span><span class="tab-row2">${row2 || ''}</span>`;
    btn.dataset.index = i;
    btn.onclick = () => switchTab(i);
    tabsEl.appendChild(btn);

    const stepsHTML = lesson.steps.map(step => `
      <div class="step">
        <div class="step-header">
          <div class="step-num">${step.num}</div>
          <div class="step-label">${step.label}</div>
        </div>
        ${renderStepBody(step)}
      </div>`).join("");

    const purposeHTML = lesson.purpose.map(p => `<li>${p}</li>`).join("");

    let prepHTML = "";
    if (lesson.prep) {
      prepHTML = `<div class="section-title">🧰 事前準備</div><div class="prep-list">`;
      lesson.prep.forEach(p => {
        prepHTML += `<div class="prep-item"><div class="prep-check">✅</div><div class="prep-body"><div class="prep-label">${p.label}</div>`;
        if (p.body) prepHTML += `<div class="prep-text">${p.body}</div>`;
        if (p.url) prepHTML += `<div class="url-block"><div class="url-row"><span class="url-text">${p.url}</span><button class="copy-btn" data-copy-text="${p.url}" data-original="コピー">コピー</button></div></div>`;
        if (p.linkUrl) prepHTML += `<div class="prep-link-wrap"><a class="prep-link" href="${p.linkUrl}" target="_blank" rel="noopener">🎥 ${p.linkUrl} →</a></div>`;
        prepHTML += `</div></div>`;
      });
      prepHTML += `</div>`;
    }

    const flowLabel = lesson.sectionLabel || "実習の流れ";
    const themeHTML = lesson.theme ? `<div class="theme-badge">研修内容：${lesson.theme}</div>` : "";

    const panel = document.createElement("div");
    panel.className = "panel" + (isActive ? " active" : "");
    panel.dataset.index = i;
    panel.innerHTML = `
      <div class="lesson-meta">
        ${themeHTML}
        <div class="date-badge">${lesson.date}</div>
      </div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="section-title">🎯 実習の目的</div>
      <ul class="purpose-list">${purposeHTML}</ul>
      ${prepHTML}
      <div class="section-title">💡 ${flowLabel}</div>
      <div class="steps">${stepsHTML}</div>
    `;
    panelsEl.appendChild(panel);
  });

  // コピーボタンのイベント委譲
  panelsEl.addEventListener("click", e => {
    const btn = e.target.closest(".copy-btn, .prompt-copy-btn");
    if (!btn) return;
    flashCopied(btn, btn.dataset.original);
  });
}

function switchTab(index) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.tab-btn[data-index="${index}"]`).classList.add("active");
  document.querySelector(`.panel[data-index="${index}"]`).classList.add("active");
}

renderAll();
updateCountdown();
</script>
</body>
</html>
